server:
  port: 8083

spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: techprocess-service
          uri: lb://techprocess-service
          predicates:
            - Path=/api/v1/techprocess-service/**
          filters:
            - TokenRelay

        - id: library-equipments
          uri: lb://technical-library-service
          predicates:
            - Path=/api/v1/library-service/equipments/**
          filters:
            - TokenRelay

        - id: library-materials
          uri: lb://technical-library-service
          predicates:
            - Path=/api/v1/library-service/materials/**
          filters:
            - TokenRelay

        - id: library-safety-instructions
          uri: lb://technical-library-service
          predicates:
            - Path=/api/v1/library-service/safety-instructions/**
          filters:
            - TokenRelay

        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/v1/notification-service/**
          filters:
            - TokenRelay

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI}
