server:
  port: 8081

logging:
  level:
    root: INFO
    by.niruin.library: INFO

scheduler:
  outbox:
    batch-size: 10
    millis-delay: 5000

spring:
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true

  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${LIBRARY_DB_URL}
    username: ${LIBRARY_DB_USERNAME}
    password: ${LIBRARY_DB_PASSWORD}

  jpa:
    show-sql: false
    properties:
      hibernate:
        default_schema: library
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

  cache:
    type: redis
    redis:
      time-to-live: 60m
      cache-null-values: false

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer
      properties:
        spring.json.trusted.packages: '*'

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      show-components: always
      probes:
        enabled: true
    metrics:
      enabled: true
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: technical-library-service

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s
        permitted-number-of-calls-in-half-open-state: 3
        slow-call-duration-threshold: 2s
        slow-call-rate-threshold: 50
        register-health-indicator: true
    instances:
      libraryService:
        baseConfig: default

file-service:
  url: ${FILE_SERVICE_URL}
  path: /api/v1/file-service/files/images